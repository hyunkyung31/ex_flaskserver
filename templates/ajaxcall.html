{% extends "base.html" %}
{% block contents %}
<script>
    $SCRIPT_ROOT = {{ request.script_root | tojson }}; //filter표시 JSON으로 바꿔라 
    $(function() {
        $("a#calculate").bind('click', function() {
            $.getJSON($SCRIPT_ROOT + '/_add_numbers', { //getJSON : ajax 명령어 : get방식만 가능, 결과 JSON
                a : $('input[name="a"]').val(),
                b : $('input[name="b"]').val()
            }, function(data) {
                $("#result").text(data.result);
            });
            return false;
        });
    });    
</script>
<h1>jQuery Example</h1>
<p><input type="text" size="5" name="a"> +
   <input type="text" size="5" name="b"> =
   <span id="result">?</span></p>
   <p><a href="#" id="calculate">서버에서 계산</a></p>
{% endblock contents %}
