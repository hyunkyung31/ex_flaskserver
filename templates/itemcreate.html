{% extends "base.html" %}

{% endblock header %}
{% block contents %}
<h1> Item 입력폼</h1>
<form method = "POST" action = "{{ url_for('item_crud') }}">
    {{ form.csrf_token }} <!--해킹방지 / 보안을 위해서 자동으로 토큰 붙여주는거 안써주면 작동 안한다-->
